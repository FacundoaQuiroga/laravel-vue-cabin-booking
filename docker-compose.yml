services:
  php:
    build: ./docker/php
    volumes:
      - ./backend:/var/www/html
    networks:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app

  mysql:
    image: mysql:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reservas
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    networks:
      - app

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    ports:
      - "1027:1025"
      - "8027:8025"
    networks:
      - app

volumes:
  dbdata:

networks:
  app:
    driver: bridge